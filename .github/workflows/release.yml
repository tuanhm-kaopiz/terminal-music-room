name: CI and Release

on:
  push:
    branches: [main, master]
    tags: ["v*"]
  pull_request:

permissions:
  contents: read

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: go test
        run: go test ./...

      - name: go vet
        run: go vet ./...

  release:
    name: Release
    needs: test
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Resolve version
        id: version
        run: echo "value=${GITHUB_REF#refs/tags/v}" >> "$GITHUB_OUTPUT"

      - name: Build linux/amd64 binaries
        run: |
          mkdir -p dist
          VERSION="${{ steps.version.outputs.value }}"
          CGO_ENABLED=0 GOOS=linux GOARCH=amd64 go build -trimpath -ldflags="-s -w" -o dist/music-room ./cmd/music-room
          CGO_ENABLED=0 GOOS=linux GOARCH=amd64 go build -trimpath -ldflags="-s -w" -o dist/music-roomd ./cmd/music-roomd
          chmod +x dist/music-room dist/music-roomd
          (cd dist && sha256sum music-room music-roomd > SHA256SUMS)
          tar -C dist -czf "dist/terminal-music-room_${VERSION}_linux_amd64.tar.gz" music-room music-roomd SHA256SUMS

      - name: Build Debian packages
        run: |
          chmod +x packaging/build-deb.sh
          ./packaging/build-deb.sh "${{ steps.version.outputs.value }}"

      - name: Upload release assets
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            dist/music-room
            dist/music-roomd
            dist/SHA256SUMS
            dist/terminal-music-room_${{ steps.version.outputs.value }}_linux_amd64.tar.gz
            dist/music-room_${{ steps.version.outputs.value }}-1_amd64.deb
            dist/music-roomd_${{ steps.version.outputs.value }}-1_amd64.deb
